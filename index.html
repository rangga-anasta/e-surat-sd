<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Surat - Sistem Informasi Tata Usaha SD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        navy: { main: '#1b2240', card: '#252d4e', hover: '#2f3961' },
                        teal: { main: '#047787', card: '#0b8b9c', hover: '#109fb2' }
                    },
                    animation: { blob: "blob 7s infinite" },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .view-section { display: none; height: 100%; }
        .view-section.active { display: flex; flex-direction: column; }
        
        /* Login Sliding Animation */
        .sliding-container {
            position: relative; overflow: hidden; width: 768px; max-width: 95%; min-height: 520px;
            background-color: #fff; border-radius: 30px; box-shadow: 0 14px 28px rgba(0,0,0,0.25);
        }
        .form-container { position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out; }
        .sign-in-container { left: 0; width: 50%; z-index: 2; }
        .overlay-container {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            overflow: hidden; transition: transform 0.6s ease-in-out; z-index: 100;
        }
        .overlay {
            background: linear-gradient(135deg, #1b2240 0%, #047787 100%);
            color: #FFFFFF; position: relative; left: -100%; height: 100%; width: 200%;
            transform: translateX(0); transition: transform 0.6s ease-in-out;
        }
        .overlay-panel {
            position: absolute; display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 0 40px; text-align: center; top: 0; height: 100%; width: 50%;
        }
        .overlay-right { right: 0; }
        .modal-input {
            background-color: #f1f5f9; border: 1px solid #e2e8f0;
            padding: 12px 15px; margin: 8px 0; width: 100%; border-radius: 12px; outline: none;
        }
    </style>
</head>
<body class="text-slate-800 h-screen w-screen flex flex-col">

    <div id="login-overlay" class="fixed inset-0 z-[100] bg-slate-100 flex items-center justify-center">
        <div class="sliding-container">
            <div class="form-container sign-in-container">
                <form class="flex flex-col items-center justify-center h-full p-10 text-center" onsubmit="prosesLogin(event)">
                    <h1 class="text-2xl font-bold mb-2">E-Surat SD</h1>
                    <p class="text-sm text-slate-500 mb-5">Sistem Tata Usaha Digital</p>
                    <input type="text" placeholder="Username" class="modal-input" required />
                    <input type="password" placeholder="Password" class="modal-input" required />
                    <button type="submit" class="mt-4 bg-navy-main text-white px-10 py-3 rounded-xl font-bold hover:bg-teal-main transition">MASUK</button>
                </form>
            </div>
            <div class="overlay-container hidden md:block">
                <div class="overlay">
                    <div class="overlay-panel overlay-right">
                        <h1 class="text-2xl font-bold mb-4">Halo, Rekan Guru!</h1>
                        <p class="text-sm mb-8">Silakan login untuk mengelola arsip surat sekolah Anda dengan mudah dan cepat.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <header class="h-16 bg-white border-b flex items-center justify-between px-6 z-30">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg"><i data-lucide="menu"></i></button>
            <span class="font-bold text-xl text-navy-main">E-Surat SD</span>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-online" class="hidden text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded">ONLINE</div>
            <i data-lucide="bell" class="w-5 h-5 text-slate-500"></i>
            <img src="https://ui-avatars.com/api/?name=Admin&background=1b2240&color=fff" class="w-8 h-8 rounded-full">
        </div>
    </header>

    <main class="flex-1 overflow-hidden relative flex">
        <aside id="sidebar" class="fixed md:relative z-40 w-64 h-full bg-white border-r transform -translate-x-full md:translate-x-0 transition-transform">
            <nav class="p-4 space-y-2">
                <button onclick="switchView('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-lg font-medium">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="switchView('surat-masuk')" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-lg font-medium">
                    <i data-lucide="inbox" class="w-5 h-5"></i> Surat Masuk
                </button>
                <button onclick="switchView('surat-keluar')" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-lg font-medium">
                    <i data-lucide="send" class="w-5 h-5"></i> Surat Keluar
                </button>
                <hr>
                <button onclick="location.reload()" class="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg font-medium">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
                </button>
            </nav>
        </aside>

        <div class="flex-1 overflow-y-auto custom-scroll p-6 bg-slate-50">
            <div id="view-dashboard" class="view-section active">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="bg-navy-main p-6 rounded-2xl text-white">
                        <p class="text-sm opacity-80">Total Surat Masuk</p>
                        <h2 id="count-masuk" class="text-4xl font-bold">0</h2>
                    </div>
                    <div class="bg-teal-main p-6 rounded-2xl text-white">
                        <p class="text-sm opacity-80">Total Surat Keluar</p>
                        <h2 id="count-keluar" class="text-4xl font-bold">0</h2>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl border">
                    <h3 class="font-bold mb-4">Statistik Surat 2026</h3>
                    <canvas id="suratChart" height="100"></canvas>
                </div>
            </div>

            <div id="view-surat-masuk" class="view-section">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Arsip Surat Masuk</h2>
                    <button class="bg-navy-main text-white px-4 py-2 rounded-lg text-sm">+ Tambah</button>
                </div>
                <div class="bg-white rounded-xl border overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4">Tanggal</th>
                                <th class="p-4">Nomor Surat</th>
                                <th class="p-4">Asal</th>
                                <th class="p-4">Perihal</th>
                            </tr>
                        </thead>
                        <tbody id="table-masuk"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // GANTI URL INI DENGAN URL GOOGLE APPS SCRIPT ANDA
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyt-0l1uIMpTaJ4kWda8K8g9nm_YKMs8bZugHv54ZfTIF8d-ONuIkr3HZWKJizNVhlbGg/exec";

        let dataSurat = { masuk: [], keluar: [] };

        function prosesLogin(e) {
            e.preventDefault();
            document.getElementById('login-overlay').style.display = 'none';
            fetchData();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('-translate-x-full');
        }

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
        }

        async function fetchData() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                dataSurat = data;
                document.getElementById('status-online').classList.remove('hidden');
                renderUI();
            } catch (e) {
                console.log("Offline mode atau URL belum siap.");
            }
        }

        function renderUI() {
            document.getElementById('count-masuk').innerText = dataSurat.masuk.length;
            document.getElementById('count-keluar').innerText = dataSurat.keluar.length;

            const tbodyMasuk = document.getElementById('table-masuk');
            tbodyMasuk.innerHTML = dataSurat.masuk.map(s => `
                <tr class="border-b">
                    <td class="p-4">${s.tanggal}</td>
                    <td class="p-4 font-bold">${s.nomor}</td>
                    <td class="p-4">${s.asal}</td>
                    <td class="p-4">${s.perihal}</td>
                </tr>
            `).join('');
            
            initChart();
        }

        function initChart() {
            const ctx = document.getElementById('suratChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun'],
                    datasets: [{
                        label: 'Surat Masuk',
                        data: [12, 19, 3, 5, 2, 3],
                        borderColor: '#1b2240',
                        tension: 0.4
                    }]
                }
            });
        }
    </script>
</body>
</html>
